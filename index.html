<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ICML 2026 Candidate Dispatch Board</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #5f6b7a;
      --line: #d9e2ec;
      --soft: #f6f8fb;
      --navy: #173f5f;
      --blue: #20639b;
      --p0: #f4b183;
      --p1: #ffe699;
      --p2: #d9ead3;
      --ok: #28745c;
      --panel: #ffffff;
      --shadow: 0 12px 30px rgba(24, 39, 75, .13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: #eef3f8;
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans SC", sans-serif;
      letter-spacing: 0;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--navy);
      color: white;
      border-bottom: 1px solid rgba(255,255,255,.18);
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
    }
    h1 { margin: 0; font-size: 18px; font-weight: 750; }
    .sub { margin-top: 2px; color: #d7e5f1; font-size: 12px; }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .stat {
      min-width: 86px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      border-radius: 6px;
      text-align: right;
    }
    .stat b { display: block; font-size: 17px; }
    .tabs {
      display: flex;
      gap: 2px;
      padding: 0 20px 10px;
      overflow-x: auto;
    }
    .tab {
      border: 0;
      background: rgba(255,255,255,.1);
      color: #eaf3fb;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 650;
      white-space: nowrap;
    }
    .tab.active { background: white; color: var(--navy); }
    main { padding: 16px 20px 28px; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 1.2fr) repeat(3, minmax(150px, .4fr));
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: white;
      color: var(--ink);
      font: inherit;
    }
    .view { display: none; }
    .view.active { display: block; }
    .table-wrap {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      box-shadow: var(--shadow);
      max-height: calc(100vh - 190px);
    }
    table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1180px; }
    th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: var(--navy);
      color: white;
      padding: 9px 10px;
      text-align: left;
      font-weight: 750;
      border-right: 1px solid rgba(255,255,255,.18);
      white-space: nowrap;
    }
    td {
      vertical-align: top;
      padding: 9px 10px;
      border-right: 1px solid #edf2f7;
      border-bottom: 1px solid #edf2f7;
      background: white;
    }
    tr:hover td { background: #f8fbff; }
    a { color: #165d93; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .name-btn {
      border: 0;
      background: transparent;
      padding: 0;
      color: #165d93;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      text-align: left;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      border-radius: 999px;
      padding: 3px 8px;
      font-weight: 760;
      border: 1px solid rgba(0,0,0,.08);
    }
    .p0 { background: var(--p0); }
    .p1 { background: var(--p1); }
    .p2 { background: var(--p2); }
    .muted { color: var(--muted); }
    .opener { max-width: 360px; }
    .paper { max-width: 300px; font-weight: 650; }
    .stage { max-width: 150px; font-size: 12px; color: #475569; }
    .stage.senior { color: #b45309; font-weight: 700; background: #fff7ed; }
    .score { text-align: center; font-weight: 700; font-variant-numeric: tabular-nums; width: 34px; }
    .score.s5 { background: #15803d; color: #fff; }
    .score.s4 { background: #4ade80; color: #052e16; }
    .score.s3 { background: #fde68a; color: #713f12; }
    .score.s2 { background: #fed7aa; color: #7c2d12; }
    .score.s1 { background: #fee2e2; color: #7f1d1d; }
    .score.s0 { background: #f1f5f9; color: #94a3b8; }
    .session-cell { min-width: 168px; }
    .calendar {
      display: grid;
      grid-template-columns: 190px repeat(13, minmax(190px, 1fr));
      min-width: 2660px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      box-shadow: var(--shadow);
      max-height: calc(100vh - 190px);
    }
    .cal-head, .cal-time, .cal-cell {
      border-right: 1px solid #e7edf4;
      border-bottom: 1px solid #e7edf4;
      padding: 10px;
      min-height: 92px;
    }
    .cal-head {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--navy);
      color: white;
      min-height: 42px;
      font-weight: 750;
    }
    .cal-time {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #f8fafc;
      font-weight: 750;
      color: #26394d;
    }
    .cal-head:first-child { left: 0; z-index: 5; }
    .cal-card {
      display: block;
      width: 100%;
      border: 1px solid #dfe7ef;
      border-left: 4px solid var(--blue);
      background: #fbfdff;
      border-radius: 6px;
      padding: 7px 8px;
      margin-bottom: 6px;
      text-align: left;
      cursor: pointer;
      color: var(--ink);
    }
    .cal-card.p0 { border-left-color: #d95f02; background: #fff6ef; }
    .cal-card.p1 { border-left-color: #c9a227; background: #fffbed; }
    .cal-card strong { display: block; font-size: 13px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
    }
    .candidate-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .candidate-card h3 { margin: 0 0 5px; font-size: 16px; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .tag { border: 1px solid #dfe7ef; background: #f7fafc; border-radius: 999px; padding: 3px 8px; color: #35495e; font-size: 12px; }
    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(20, 31, 45, .38);
    }
    .drawer {
      position: fixed;
      z-index: 45;
      top: 0;
      right: 0;
      height: 100vh;
      width: min(720px, 92vw);
      background: white;
      transform: translateX(105%);
      transition: transform .18s ease;
      box-shadow: -18px 0 40px rgba(0,0,0,.22);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    body.drawer-open .drawer { transform: translateX(0); }
    body.drawer-open .drawer-backdrop { display: block; }
    .drawer-head {
      padding: 16px 18px;
      background: var(--navy);
      color: white;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }
    .drawer-head h2 { margin: 0; font-size: 20px; }
    .close {
      border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.12);
      color: white;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .drawer-body { overflow: auto; padding: 16px 18px 24px; }
    .section { margin-bottom: 18px; }
    .section h4 { margin: 0 0 7px; font-size: 13px; color: var(--navy); text-transform: uppercase; letter-spacing: .04em; }
    .kv {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 6px 10px;
      margin: 10px 0;
    }
    .kv b { color: var(--muted); }
    .paper-list { padding-left: 18px; margin: 8px 0 0; }
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .staff-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .staff-card h3 { margin: 0 0 8px; font-size: 15px; }
    .numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 8px; }
    .num { background: var(--soft); border-radius: 6px; padding: 7px; text-align: center; }
    .num b { display: block; font-size: 16px; }
    @media (max-width: 900px) {
      .topbar, .toolbar { grid-template-columns: 1fr; }
      .stats { justify-content: flex-start; }
      main { padding: 12px; }
      .table-wrap { max-height: none; }
    }

    /* Calendar agenda (mobile only) — hidden on desktop */
    .cal-agenda { display: none; }
    .agenda-block { margin: 0 0 16px; }
    .agenda-time { position: sticky; top: 0; z-index: 2; background: var(--navy); color: #fff;
      font-weight: 700; font-size: 13px; padding: 8px 12px; border-radius: 8px; }
    .agenda-count { float: right; opacity: .8; font-weight: 600; }
    .agenda-card { display: block; width: 100%; text-align: left; cursor: pointer;
      background: #fff; border: 1px solid var(--line); border-left: 4px solid #cbd5e1;
      border-radius: 8px; padding: 10px 12px; margin: 8px 0 0; box-shadow: var(--shadow); }
    .agenda-card.p0 { border-left-color: #dc2626; }
    .agenda-card.p1 { border-left-color: #d97706; }
    .agenda-card.p2 { border-left-color: #2563eb; }
    .agenda-row1 { font-size: 16px; color: var(--ink); margin-bottom: 3px; }
    .agenda-pri { display: inline-block; font-size: 11px; font-weight: 700; color: #fff;
      background: #64748b; padding: 1px 7px; border-radius: 10px; vertical-align: middle; }
    .agenda-card.p0 .agenda-pri { background: #dc2626; }
    .agenda-card.p1 .agenda-pri { background: #d97706; }
    .agenda-card.p2 .agenda-pri { background: #2563eb; }
    .agenda-rank { color: #94a3b8; font-size: 12px; }
    .agenda-meta { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .agenda-paper { font-size: 13px; color: #1d4ed8; font-weight: 600; line-height: 1.4; }
    .agenda-empty { padding: 24px; text-align: center; color: #94a3b8; }

        /* ---- Mobile card layout (phones / narrow screens) ---- */
    @media (max-width: 768px) {
      .table-wrap { border: none; box-shadow: none; background: transparent; overflow: visible; }
      table { min-width: 0; width: 100%; display: block; }
      thead { display: none; }              /* hide header row; labels move into cards */
      tbody { display: block; }
      tbody tr {
        display: block;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: var(--shadow);
        margin: 0 0 12px;
        padding: 10px 12px;
      }
      tbody td {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        border: none;
        border-bottom: 1px dashed #eef0f3;
        padding: 6px 0;
        max-width: none !important;
        white-space: normal;
      }
      tbody td:last-child { border-bottom: none; }
      tbody td::before {
        content: attr(data-label);
        flex: 0 0 84px;
        color: #64748b;
        font-size: 12px;
        font-weight: 600;
        text-align: left;
      }
      tbody td > * { text-align: right; }
      /* score chips: small inline badge instead of full-width cell */
      tbody td.score {
        display: inline-flex;
        width: auto;
        justify-content: center;
        border: none;
        border-radius: 6px;
        margin: 4px 6px 4px 0;
        padding: 3px 10px;
      }
      tbody td.score::before { flex: none; margin-right: 6px; color: inherit; opacity: .85; }
      /* group the 3 score cells visually — they sit inline */
      .name-btn { font-size: 16px; font-weight: 700; }        /* bigger tap target */
      td.stage { font-size: 12px; }
      td.opener { font-size: 13px; line-height: 1.5; }
      td.opener::before, td.paper::before { align-self: flex-start; }
      .tabs { padding: 0 8px 8px; }
      header h1 { font-size: 18px; }
      /* keep wide calendar/staffing grids scrolling inside their box, not the page */
      html, body { overflow-x: hidden; }
      /* calendar: swap wide grid for vertical agenda on phones */
      #calendarGrid { display: none; }
      .cal-agenda { display: block; }
      #view-staffing .table-wrap, #view-briefs .table-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>ICML 2026 Candidate Dispatch Board</h1>
        <div class="sub">现场寻访调度：按时间、session、poster/oral 找人，点击候选人查看完整速读。</div>
      </div>
      <div class="stats">
        <div class="stat"><b id="statTasks">0</b><span>touchpoints</span></div>
        <div class="stat"><b id="statCandidates">0</b><span>candidates</span></div>
        <div class="stat"><b id="statP0">0</b><span>P0 tasks</span></div>
        <div class="stat"><b id="statStaff">0</b><span>peak staff</span></div>
      </div>
    </div>
    <div class="tabs" role="tablist">
      <button class="tab active" data-view="dispatch">Dispatch Board</button>
      <button class="tab" data-view="calendar">Calendar View</button>
      <button class="tab" data-view="staffing">Staffing Summary</button>
      <button class="tab" data-view="candidates">Candidate Briefs</button>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <input id="search" type="search" placeholder="搜索候选人、学校、论文、session、岗位方向..." />
      <select id="priority"><option value="">All priorities</option><option>P0</option><option>P1</option><option>P2</option></select>
      <select id="time"><option value="">All time blocks</option></select>
      <select id="session"><option value="">All sessions</option></select>
    </div>

    <section id="view-dispatch" class="view active">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Time</th><th>Session</th><th>Location</th><th>Priority</th><th>Rank</th><th>Candidate</th><th>Institution</th><th>Stage / 学位阶段</th><th title="模型训练 / 代码大模型 / SFT-RL / 评测">Model</th><th title="Coding Agent / harness / 工具调用 / agent memory">Agent</th><th title="数据治理 / 合规 / 安全 / 水印溯源">Gov</th><th>ICML Paper</th><th>Why meet / opener</th></tr></thead>
          <tbody id="dispatchBody"></tbody>
        </table>
      </div>
    </section>

    <section id="view-calendar" class="view">
      <div id="calendarGrid" class="calendar"></div>
      <div id="calendarAgenda" class="cal-agenda"></div>
    </section>

    <section id="view-staffing" class="view">
      <div id="staffingGrid" class="staff-grid"></div>
    </section>

    <section id="view-candidates" class="view">
      <div id="candidateCards" class="cards"></div>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" aria-live="polite">
    <div class="drawer-head">
      <div>
        <h2 id="drawerName">Candidate</h2>
        <div id="drawerSubtitle" class="sub"></div>
      </div>
      <button class="close" id="closeDrawer" aria-label="Close">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

        const kh2 = (+h2 + 16) % 24;
        const base = new Date(2026, MONTHS[mon], +day + d1);
        const fmt = (h, m) => String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        return `${DAYS[base.getDay()]}, ${mon} ${base.getDate()}, ${fmt(kh1, +m1)}-${fmt(kh2, +m2)} KST`;
      });
    }
    const text = (value) => String(value ?? "").toLowerCase();
    const validUrl = (url) => /^https?:\/\//.test(String(url || ""));

    function taskMatches(task) {
      const q = state.search.trim().toLowerCase();
      if (state.priority && task.priority !== state.priority) return false;
      if (state.time && task.timeBlock !== state.time) return false;
      if (state.session && task.session !== state.session) return false;
      if (!q) return true;
      const haystack = [task.name, task.institution, task.paper, task.session, task.location, task.bestFit, task.opener].join(" ").toLowerCase();
      return haystack.includes(q);
    }

    function candidateMatches(candidate) {
      const q = state.search.trim().toLowerCase();
      if (state.priority && candidate.priority !== state.priority) return false;
      if (!q) return true;
      const haystack = [candidate.name, candidate.alias, candidate.institution, candidate.bestFit, candidate.brief, candidate.keywords, candidate.email].join(" ").toLowerCase();
      return haystack.includes(q);
    }

    function pill(priority) {
      const cls = priority === "P0" ? "p0" : priority === "P1" ? "p1" : "p2";
      return '<span class="pill ' + cls + '">' + esc(priority) + '</span>';
    }

    function renderDispatch() {
      const rows = DATA.tasks.filter(taskMatches);
      document.getElementById("dispatchBody").innerHTML = rows.map(t => `
        <tr>
          <td class="session-cell" data-label="时间">${esc(pdtToKST(t.timeBlock))}</td>
          <td data-label="Session">${esc(t.session)}</td>
          <td data-label="位置">${esc(t.location)}</td>
          <td data-label="优先级">${pill(t.priority)}</td>
          <td data-label="Rank">${esc(t.rank)}</td>
          <td data-label="候选人"><button class="name-btn" data-candidate="${esc(t.candidateId)}">${esc(t.name)}</button></td>
          <td data-label="院校">${esc(t.institution)}</td>
          <td data-label="学位阶段" class="stage${/professor|postdoc|alumnus|completed|scientist|research assistant/i.test((byId.get(t.candidateId) || {}).degree || "") ? " senior" : ""}">${esc((byId.get(t.candidateId) || {}).degree || "")}</td>
          ${scoreCell(t.candidateId, "modelTraining", "Model")}
          ${scoreCell(t.candidateId, "codingAgent", "Agent")}
          ${scoreCell(t.candidateId, "dataGovernance", "Gov")}
          <td class="paper" data-label="ICML 论文">${String(t.paper || "").split(/\\n|\n/).map((p, idx) => idx === 0 ? '<a href="' + esc(t.paperUrl) + '" target="_blank" rel="noopener">' + esc(p) + '</a>' : '<div>' + esc(p) + '</div>').join("")}</td>
          <td class="opener" data-label="破冰">${esc(t.opener)}</td>
        </tr>`).join("");
      bindCandidateButtons();
    }

    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      const visibleTasks = DATA.tasks.filter(taskMatches);
      const timeBlocks = DATA.timeBlocks.filter(tb => !state.time || tb === state.time);
      const sessions = DATA.sessions.filter(s => !state.session || s === state.session);
      grid.style.gridTemplateColumns = "190px repeat(" + Math.max(sessions.length, 1) + ", minmax(190px, 1fr))";
      let html = '<div class="cal-head">Time</div>' + sessions.map(s => '<div class="cal-head">' + esc(s) + '</div>').join("");
      for (const tb of timeBlocks) {
        html += '<div class="cal-time">' + esc(pdtToKST(tb)) + '</div>';
        for (const session of sessions) {
          const cell = visibleTasks.filter(t => t.timeBlock === tb && t.session === session);
          html += '<div class="cal-cell">' + cell.map(t => `
            <button class="cal-card ${String(t.priority).toLowerCase()}" data-candidate="${esc(t.candidateId)}">
              <strong>${esc(t.priority)} R${esc(t.rank)} ${esc(t.name)}</strong>
              <span>${esc(t.location).replace(/\\n|\n/g, " / ")} · ${esc(t.paper).replace(/\\n|\n/g, " / ")}</span>
            </button>`).join("") + '</div>';
        }
      }
      grid.innerHTML = html;

      // Mobile agenda: vertical, grouped by time block (no horizontal scroll)
      const agenda = document.getElementById("calendarAgenda");
      let ah = "";
      for (const tb of timeBlocks) {
        const items = visibleTasks.filter(t => t.timeBlock === tb);
        if (!items.length) continue;
        ah += '<div class="agenda-block"><div class="agenda-time">' + esc(pdtToKST(tb)) +
              ' <span class="agenda-count">' + items.length + '</span></div>';
        for (const t of items) {
          ah += `
            <button class="agenda-card ${String(t.priority).toLowerCase()}" data-candidate="${esc(t.candidateId)}">
              <div class="agenda-row1"><span class="agenda-pri">${esc(t.priority)}</span> <strong>${esc(t.name)}</strong> <span class="agenda-rank">R${esc(t.rank)}</span></div>
              <div class="agenda-meta">${esc(t.session)} · ${esc(t.location).replace(/\\n|\n/g, " / ")}</div>
              <div class="agenda-paper">${esc(t.paper).split(/\\n|\n/)[0]}</div>
            </button>`;
        }
        ah += '</div>';
      }
      agenda.innerHTML = ah || '<div class="agenda-empty">当前筛选条件下没有会面安排</div>';
      bindCandidateButtons();
    }

    function renderStaffing() {
      const rows = DATA.staffing.filter(r => (!state.time || r.timeBlock === state.time));
      document.getElementById("staffingGrid").innerHTML = rows.map(r => `
        <article class="staff-card">
          <h3>${esc(pdtToKST(r.timeBlock))}</h3>
          <div class="numbers">
            <div class="num"><b>${r.total}</b><span>Total</span></div>
            <div class="num"><b>${r.p0}</b><span>P0</span></div>
            <div class="num"><b>${r.p1}</b><span>P1</span></div>
            <div class="num"><b>${r.sessionCount}</b><span>Sessions</span></div>
            <div class="num"><b>${r.suggested}</b><span>Staff</span></div>
          </div>
          <div class="muted">Must cover</div>
          <div>${r.mustCover.length ? esc(r.mustCover.join("; ")) : "No P0 conflict"}</div>
        </article>`).join("");
    }

    function renderCandidates() {
      const rows = DATA.candidates.filter(candidateMatches);
      document.getElementById("candidateCards").innerHTML = rows.map(c => `
        <article class="candidate-card">
          <h3><button class="name-btn" data-candidate="${esc(c.id)}">${esc(c.name)}</button></h3>
          <div class="meta">${pill(c.priority)}<span class="tag">Rank ${esc(c.rank)}</span><span class="tag">${esc(c.institution)}</span></div>
          <div><b>${esc(c.bestFit)}</b></div>
          <p>${esc(c.brief).slice(0, 230)}${c.brief.length > 230 ? "…" : ""}</p>
        </article>`).join("");
      bindCandidateButtons();
    }

    function renderStats() {
      const filtered = DATA.tasks.filter(taskMatches);
      document.getElementById("statTasks").textContent = filtered.length;
      document.getElementById("statCandidates").textContent = new Set(filtered.map(t => t.candidateId)).size;
      document.getElementById("statP0").textContent = filtered.filter(t => t.priority === "P0").length;
      document.getElementById("statStaff").textContent = Math.max(...DATA.staffing.map(s => s.suggested), 0);
    }

    function render() {
      renderStats();
      renderDispatch();
      renderCalendar();
      renderStaffing();
      renderCandidates();
    }

    function links(c) {
      const items = [
        ["Homepage", c.homepage],
        ["GitHub", c.github],
        ["Scholar", c.scholar],
      ].filter(([,url]) => url && url !== "unknown");
      return items.map(([label, url]) => validUrl(url) ? '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + label + '</a>' : '<span>' + esc(label) + ': ' + esc(url) + '</span>').join(" · ");
    }

    function openCandidate(id) {
      const c = byId.get(id);
      if (!c) return;
      document.getElementById("drawerName").textContent = c.name;
      document.getElementById("drawerSubtitle").textContent = [c.priority, "Rank " + c.rank, c.institution, c.degree].filter(Boolean).join(" · ");
      const taskRows = DATA.tasks.filter(t => t.candidateId === id);
      document.getElementById("drawerBody").innerHTML = `
        <div class="section">
          <h4>Fit Summary</h4>
          <div class="kv">
            <b>Best fit</b><span>${esc(c.bestFit)}</span>
            <b>Scores</b><span>Total ${esc(c.totalScore)} · Model ${esc(c.scores.modelTraining)} · Agent ${esc(c.scores.codingAgent)} · Governance ${esc(c.scores.dataGovernance)}${c.rescoreNote ? '<br><em style="color:#b45309">复核调整：' + esc(c.rescoreNote) + '</em>' : ''}</span>
            <b>Email</b><span>${esc(c.email || "unknown")}</span>
            <b>Links</b><span>${links(c)}</span>
          </div>
        </div>
        <div class="section"><h4>HR Brief</h4><p>${esc(c.brief)}</p></div>
        <div class="section"><h4>Where To Find</h4>
          <ul class="paper-list">${taskRows.map(t => '<li><b>' + esc(t.timeBlock) + '</b> · ' + esc(t.session) + ' · ' + esc(t.location).replace(/\\n|\n/g, " / ") + ' · <a href="' + esc(t.paperUrl) + '" target="_blank" rel="noopener">' + esc(t.paper).replace(/\\n|\n/g, " / ") + '</a></li>').join("")}</ul>
        </div>
        <div class="section"><h4>Strengths</h4><p>${esc(c.strengths)}</p></div>
        <div class="section"><h4>Gaps / Risks</h4><p>${esc(c.gaps)}</p></div>
        <div class="section"><h4>Keywords</h4><p>${esc(c.keywords)}</p></div>
        <div class="section"><h4>Industry Experience</h4><p>${esc(c.industry || "unknown")}</p></div>
      `;
      document.body.classList.add("drawer-open");
    }

    function bindCandidateButtons() {
      document.querySelectorAll("[data-candidate]").forEach(btn => {
        btn.onclick = () => openCandidate(btn.dataset.candidate);
      });
    }

    function closeDrawer() { document.body.classList.remove("drawer-open"); }

    function fillFilters() {
      document.getElementById("time").innerHTML = '<option value="">All time blocks</option>' + DATA.timeBlocks.map(t => '<option value="' + esc(t) + '">' + esc(pdtToKST(t)) + '</option>').join("");
      document.getElementById("session").innerHTML = '<option value="">All sessions</option>' + DATA.sessions.map(s => '<option>' + esc(s) + '</option>').join("");
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        state.view = tab.dataset.view;
        document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === tab));
        document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === "view-" + state.view));
      });
    });
    document.getElementById("search").addEventListener("input", e => { state.search = e.target.value; render(); });
    document.getElementById("priority").addEventListener("change", e => { state.priority = e.target.value; render(); });
    document.getElementById("time").addEventListener("change", e => { state.time = e.target.value; render(); });
    document.getElementById("session").addEventListener("change", e => { state.session = e.target.value; render(); });
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    document.getElementById("drawerBackdrop").addEventListener("click", closeDrawer);
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

    fillFilters();
    render();
  </script>
</body>
</html>
